<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>نظام إدارة الخضار والفواكه</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
/* =============================================
   CSS VARIABLES & RESET
============================================= */
:root{
  --primary:      #14b8a6;
  --primary-dark: #0f766e;
  --bg:           #f0fdf9;
  --card:         #ffffff;
  --text:         #0f172a;
  --muted:        #64748b;
  --danger:       #ef4444;
  --success:      #22c55e;
  --warning:      #f59e0b;
  --radius:       12px;
  --shadow:       0 2px 12px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}

/* =============================================
   LOADING
============================================= */
#loadingScreen{
  position:fixed;inset:0;background:white;z-index:9999;
  display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;
}
.loader{
  width:44px;height:44px;
  border:4px solid #e2e8f0;
  border-top-color:var(--primary);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* =============================================
   SYNC BAR
============================================= */
#syncBar{
  background:#f8fafc;padding:5px 16px;text-align:center;
  font-size:12px;border-bottom:1px solid #e2e8f0;
  position:sticky;top:0;z-index:50;
}

/* =============================================
   AUTH
============================================= */
#authScreen{
  position:fixed;inset:0;
  background:linear-gradient(135deg,var(--primary-dark),var(--primary));
  display:none;justify-content:center;align-items:center;
}
.auth-box{
  background:white;padding:32px;width:360px;
  border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.2);
}
.auth-box h2{
  text-align:center;margin-bottom:20px;
  color:var(--primary-dark);font-size:20px;
}
.auth-box hr{margin:20px 0;border:none;border-top:1px solid #e2e8f0;}
.auth-box h3{text-align:center;margin-bottom:12px;font-size:16px;color:var(--muted);}

/* =============================================
   LAYOUT
============================================= */
.app{display:flex;height:100vh;overflow:hidden;}
.hidden{display:none!important;}

/* =============================================
   SIDEBAR
============================================= */
.sidebar{
  width:220px;flex-shrink:0;overflow-y:auto;
  background:linear-gradient(180deg,var(--primary-dark),var(--primary));
  display:flex;flex-direction:column;color:white;
}
.sidebar .logo{
  padding:20px 16px;text-align:center;
  font-weight:900;font-size:18px;letter-spacing:-0.5px;
  border-bottom:1px solid rgba(255,255,255,0.15);
}
.sidebar nav{flex:1;padding:8px 0;}
.sidebar nav button{
  width:100%;padding:11px 16px;
  border:none;background:transparent;
  color:rgba(255,255,255,0.9);text-align:right;
  cursor:pointer;font-family:'Cairo',sans-serif;
  font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:8px;
  transition:background 0.15s;
}
.sidebar nav button:hover  { background:rgba(255,255,255,0.18); }
.sidebar nav button.active { background:rgba(255,255,255,0.28); }
.sidebar-footer{padding:12px;}
.sidebar-footer button{
  width:100%;padding:10px;
  border:1px solid rgba(255,255,255,0.3);
  background:transparent;color:white;border-radius:8px;
  cursor:pointer;font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;
}

/* =============================================
   CONTENT AREA
============================================= */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.header{
  background:white;padding:14px 20px;
  border-bottom:1px solid #e2e8f0;
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0;
}
.header h1{font-size:18px;font-weight:700;}
.header-actions{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);}
.page-wrap{flex:1;overflow-y:auto;padding:20px;}

/* =============================================
   PAGES
============================================= */
.page{display:none;}
.page h2{font-size:18px;font-weight:700;margin-bottom:16px;}
.page h3{font-size:15px;font-weight:700;margin:20px 0 12px;}

/* =============================================
   GRID & CARDS
============================================= */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
  gap:12px;margin-bottom:20px;
}
.card{
  background:var(--card);padding:16px;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  border:1px solid #f1f5f9;
  margin-bottom:12px;
}
.stat-card{text-align:center;}
.stat-card h4{font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600;}
.stat-card p{font-size:22px;font-weight:900;color:var(--primary-dark);}
.stat-card small{font-size:11px;color:var(--muted);}

/* Employee / Partner cards */
.employee-card{ margin-bottom:12px; }
.card-header-row{
  display:flex;justify-content:space-between;
  align-items:flex-start;flex-wrap:wrap;gap:10px;
}
.card-header-row h3{font-size:16px;font-weight:700;margin-bottom:4px;}
.card-meta{font-size:12px;color:var(--muted);line-height:1.8;}
.net-amount{font-size:16px;font-weight:900;text-align:center;line-height:1.4;}

/* =============================================
   BUTTONS
============================================= */
.btn{
  padding:9px 14px;border:none;border-radius:8px;
  cursor:pointer;font-family:'Cairo',sans-serif;
  font-size:13px;font-weight:700;
  display:inline-flex;align-items:center;gap:5px;
  transition:opacity 0.15s,transform 0.1s;
}
.btn:hover   { opacity:0.87; }
.btn:active  { transform:scale(0.97); }
.btn:disabled{ opacity:0.45;cursor:not-allowed; }
.btn-primary { background:var(--primary);color:white; }
.btn-danger  { background:var(--danger);color:white; }
.btn-success { background:var(--success);color:white; }
.btn-warning { background:var(--warning);color:white; }
.btn-outline {
  background:transparent;color:var(--text);
  border:1px solid #e2e8f0;
}
.btn-sm{ padding:6px 10px;font-size:12px; }
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}

/* =============================================
   FORM ELEMENTS
============================================= */
label{
  display:block;font-size:12px;font-weight:700;
  color:var(--muted);margin-top:12px;margin-bottom:2px;
}
input,select,textarea{
  width:100%;padding:10px 12px;
  border:1px solid #e2e8f0;border-radius:8px;
  font-family:'Cairo',sans-serif;font-size:13px;
  background:white;color:var(--text);outline:none;
  transition:border-color 0.15s;
}
input:focus,select:focus,textarea:focus{ border-color:var(--primary); }
textarea{ resize:vertical;min-height:80px; }

/* =============================================
   TABLES
============================================= */
.table-wrap{
  overflow-x:auto;border-radius:var(--radius);
  border:1px solid #e2e8f0;background:white;
  margin-bottom:20px;
}
table.table{width:100%;border-collapse:collapse;}
table.table th{
  padding:11px 12px;background:#f8fafc;
  font-size:12px;font-weight:700;color:var(--muted);
  text-align:right;border-bottom:1px solid #e2e8f0;
}
table.table td{
  padding:11px 12px;border-bottom:1px solid #f1f5f9;
  font-size:13px;text-align:right;vertical-align:middle;
}
table.table tr:last-child td{ border-bottom:none; }
table.table tr:hover td{ background:#f8fffe; }

/* =============================================
   MODAL
============================================= */
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,0.45);
  display:flex;justify-content:center;align-items:center;z-index:888;
}
.modal-content{
  width:min(460px,92vw);background:white;
  border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.25);
  overflow:hidden;max-height:90vh;
  display:flex;flex-direction:column;
  animation:modalIn 0.2s ease;
}
@keyframes modalIn{
  from{transform:translateY(16px) scale(0.97);opacity:0;}
  to{transform:none;opacity:1;}
}
.modal-header{
  padding:14px 18px;border-bottom:1px solid #e2e8f0;
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0;
}
.modal-header h3{font-size:15px;font-weight:700;}
.modal-header button{
  background:none;border:none;cursor:pointer;
  font-size:18px;color:var(--muted);padding:4px 8px;border-radius:6px;
}
.modal-header button:hover{background:#f1f5f9;}
.modal-body  { padding:16px;overflow-y:auto;flex:1; }
.modal-footer{
  padding:12px 16px;border-top:1px solid #e2e8f0;
  display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;
}

/* =============================================
   TOAST
============================================= */
#toast{
  position:fixed;bottom:24px;left:24px;
  color:white;padding:12px 18px;border-radius:10px;
  display:none;font-size:14px;font-weight:700;
  z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,0.2);
  animation:slideUp 0.2s ease;
}
@keyframes slideUp{
  from{transform:translateY(12px);opacity:0;}
  to{transform:none;opacity:1;}
}

/* =============================================
   BADGES
============================================= */
.badge{
  display:inline-block;padding:3px 9px;
  border-radius:20px;font-size:11px;font-weight:700;
}
.badge-green  { background:#dcfce7;color:#166534; }
.badge-red    { background:#fee2e2;color:#991b1b; }
.badge-yellow { background:#fef9c3;color:#854d0e; }

/* =============================================
   EMPTY STATE
============================================= */
.empty-state{
  text-align:center;padding:40px 20px;color:var(--muted);
}
.empty-icon{ font-size:40px;margin-bottom:10px; }
.empty-state p{ font-size:14px; }

/* =============================================
   RESPONSIVE
============================================= */
@media(max-width:768px){
  .sidebar{ width:60px; }
  .sidebar .logo .logo-text{ display:none; }
  .sidebar nav button .nav-label{ display:none; }
  .page-wrap{ padding:12px; }
  .grid{ grid-template-columns:1fr 1fr; }
  .card-header-row{ flex-direction:column; }
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="loader"></div>
  <p style="color:var(--muted);font-size:14px;font-weight:600">جاري تحميل النظام...</p>
</div>

<!-- SYNC BAR -->
<div id="syncBar"><span id="syncText">جارى الاتصال...</span></div>

<!-- APP -->
<div class="app hidden" id="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">🍊 <span class="logo-text">النظام</span></div>
    <nav>
      <button onclick="navigate('dashboard')" data-page="dashboard"><span>📊</span><span class="nav-label"> الرئيسية</span></button>
      <button onclick="navigate('baqi')"      data-page="baqi">     <span>📦</span><span class="nav-label"> المتبقي</span></button>
      <button onclick="navigate('nazil')"     data-page="nazil">    <span>🚛</span><span class="nav-label"> المنتهي</span></button>
      <button onclick="navigate('sales')"     data-page="sales">    <span>🛒</span><span class="nav-label"> المبيعات</span></button>
      <button onclick="navigate('tarhil')"    data-page="tarhil">   <span>📋</span><span class="nav-label"> الترحيلات</span></button>
      <button onclick="navigate('customers')" data-page="customers"><span>👥</span><span class="nav-label"> العملاء</span></button>
      <button onclick="navigate('suppliers')" data-page="suppliers"><span>🚚</span><span class="nav-label"> الموردين</span></button>
      <button onclick="navigate('invoices')"  data-page="invoices"> <span>🧾</span><span class="nav-label"> الفواتير</span></button>
      <button onclick="navigate('employees')" data-page="employees"><span>👷</span><span class="nav-label"> الموظفين</span></button>
      <button onclick="navigate('partners')"  data-page="partners"> <span>🤝</span><span class="nav-label"> الشركاء</span></button>
      <button onclick="navigate('shops')"     data-page="shops">    <span>🏬</span><span class="nav-label"> المحلات</span></button>
      <button onclick="navigate('khazna')"    data-page="khazna">   <span>💰</span><span class="nav-label"> الخزنة</span></button>
      <button onclick="navigate('subscription')" data-page="subscription"><span>💳</span><span class="nav-label"> الاشتراك</span></button>
      <button onclick="navigate('admin')"     data-page="admin">    <span>🛠</span><span class="nav-label"> المشرف</span></button>
    </nav>
    <div class="sidebar-footer">
      <button onclick="logout()">🚪 <span class="nav-label">خروج</span></button>
    </div>
  </aside>

  <!-- CONTENT -->
  <div class="content">
    <header class="header">
      <h1 id="pageTitle">لوحة التحكم</h1>
      <div class="header-actions">
        <span id="userInfo"></span>
        <button id="closeDayBtn" class="btn btn-danger btn-sm"
                onclick="confirmCloseDay()" style="display:none">
          📆 إغلاق اليوم
        </button>
      </div>
    </header>
    <div class="page-wrap">
      <section id="dashboard"    class="page"></section>
      <section id="baqi"         class="page"></section>
      <section id="nazil"        class="page"></section>
      <section id="sales"        class="page"></section>
      <section id="tarhil"       class="page"></section>
      <section id="customers"    class="page"></section>
      <section id="suppliers"    class="page"></section>
      <section id="invoices"     class="page"></section>
      <section id="employees"    class="page"></section>
      <section id="partners"     class="page"></section>
      <section id="shops"        class="page"></section>
      <section id="khazna"       class="page"></section>
      <section id="subscription" class="page"></section>
      <section id="admin"        class="page"></section>
    </div>
  </div>
</div>

<!-- AUTH -->
<div id="authScreen">
  <div class="auth-box">
    <h2>🍊 تسجيل الدخول</h2>
    <label>البريد الإلكتروني</label>
    <input id="loginEmail" type="email" placeholder="example@mail.com">
    <label>كلمة المرور</label>
    <input id="loginPassword" type="password" placeholder="••••••••">
    <button class="btn btn-primary" style="width:100%;margin-top:14px" onclick="login()">دخول</button>
    <hr>
    <h3>إنشاء حساب جديد</h3>
    <label>اسم المحل</label>
    <input id="regName" placeholder="مثلاً: محل أبو أحمد">
    <label>البريد الإلكتروني</label>
    <input id="regEmail" type="email" placeholder="example@mail.com">
    <label>كلمة المرور</label>
    <input id="regPassword" type="password" placeholder="••••••••">
    <button class="btn btn-success" style="width:100%;margin-top:14px" onclick="register()">إنشاء حساب</button>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitle"></h3>
      <button onclick="closeModal()">✕</button>
    </div>
    <div id="modalBody"   class="modal-body"></div>
    <div id="modalFooter" class="modal-footer"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- ============================================================
     SCRIPTS — الترتيب مهم جداً
     1. Supabase CDN
     2. config.js   ← ثوابت URL والـ key
     3. core.js     ← APP object + CRUD + auth + navigation
     4. renderers.js ← RENDER object
     5. actions.js  ← ACTIONS object
============================================================ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/core.js"></script>
<script src="js/renderers.js"></script>
<script src="js/actions.js"></script>

<!-- START -->
<script>
  APP.initApp();
</script>

</body>
</html>
